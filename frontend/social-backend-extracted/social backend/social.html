<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Player - Social Hub</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="social.css">
</head>

<body>
    <!-- Top Navigation with Notifications -->
    <header class="top-nav">
        <div class="logo">AI Music</div>
        <div class="nav-actions">
            <div class="notification-wrapper">
                <button class="btn-icon bell-btn" id="bell-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="badge" id="notif-badge">0</span>
                </button>
                <div class="notification-dropdown" id="notif-dropdown">
                    <h4>Notifications</h4>
                    <div id="notif-list">
                        <div class="notif-empty">No new notifications</div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- Background Animated Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="container">
        <!-- User Profile Card -->
        <section class="card profile-card" id="profile-card">
            <div class="avatar-container">
                <img src="assets/indian_user_avatar.png" alt="User Avatar" class="avatar">
            </div>
            <div class="profile-info">
                <h1>Rahul Verma</h1>
                <p class="role">Music Enthusiast & Curator</p>
                <div class="stats">
                    <div class="stat">
                        <span class="stat-value" id="followers-count">1.4k</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value">8</span>
                        <span class="stat-label">Playlists</span>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary" id="follow-btn">Follow</button>
        </section>

        <!-- Featured Playlist Card -->
        <section class="card playlist-card" id="playlist-card">
            <h2 class="section-title">Featured Playlist</h2>
            <div class="playlist-content">
                <img src="assets/playlist.png" alt="Cyber Vibes Playlist Cover" class="playlist-cover">
                <div class="playlist-details">
                    <h3>Midnight Ghazals & Lofi</h3>
                    <p>A soulful journey blending timeless melodies with modern indie aesthetic vibes.</p>
                    <div class="tags">
                        <span class="tag">Indie Vibes</span>
                        <span class="tag">Bollywood Pop</span>
                    </div>
                </div>
            </div>
            <div class="playlist-actions">
                <button class="btn btn-secondary btn-icon" id="play-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 5V19L19 12L8 5Z" fill="currentColor" />
                    </svg>
                    Play
                </button>
                <button class="btn btn-outline btn-icon" id="share-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M18 16.08C17.24 16.08 16.56 16.38 16.04 16.85L8.91 12.7C8.96 12.47 9 12.24 9 12C9 11.76 8.96 11.53 8.91 11.3L15.96 7.19C16.5 7.69 17.21 8 18 8C19.66 8 21 6.66 21 5C21 3.34 19.66 2 18 2C16.34 2 15 3.34 15 5C15 5.24 15.04 5.47 15.09 5.7L8.04 9.81C7.5 9.31 6.79 9 6 9C4.34 9 3 10.34 3 12C3 13.66 4.34 15 6 15C6.79 15 7.5 14.69 8.04 14.19L15.16 18.34C15.11 18.55 15.08 18.77 15.08 19C15.08 20.66 16.42 22 18.08 22C19.74 22 21.08 20.66 21.08 19C21.08 17.34 19.74 16.08 18 16.08Z"
                            fill="currentColor" />
                    </svg>
                    Share
                </button>
            </div>
        </section>
    </main>

    <!-- Share Modal -->
    <div class="modal-overlay" id="share-modal">
        <div class="modal-content card">
            <div class="modal-header">
                <h3>Share Playlist</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="share-options">
                <button class="share-option whatsapp" id="share-wa">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                        </path>
                    </svg>
                    <span>WhatsApp</span>
                </button>
                <button class="share-option gmail" id="share-gmail">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <span>Email</span>
                </button>
                <button class="share-option twitter" id="share-tw">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z">
                        </path>
                    </svg>
                    <span>Twitter</span>
                </button>
                <button class="share-option copy-link" id="share-copy">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span>Copy Link</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <script src="social.js"></script>
</body>

</html>
